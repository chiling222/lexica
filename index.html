<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>Lexica · 單字複習</title>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCnqyoYBZmbAlchJn2wXc79f4mdtOf8vtU",authDomain:"lexica-1dba5.firebaseapp.com",projectId:"lexica-1dba5",storageBucket:"lexica-1dba5.firebasestorage.app",messagingSenderId:"963867947898",appId:"1:963867947898:web:32bf3c0bf27a80c8bddcc3"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const fs=getFirestore(app);
let uid=null;
async function cloudSave(){
  if(!uid)return;
  try{await setDoc(doc(fs,'users',uid,'data','lexica_data'),{payload:window._db,ts:Date.now()});}
  catch(e){console.error('cloudSave err',e);}
}
async function cloudLoad(){
  if(!uid)return;
  try{
    let snap=await getDoc(doc(fs,'users',uid,'data','lexica_data'));
    if(!snap.exists())snap=await getDoc(doc(fs,'users',uid,'data','words'));
    if(snap.exists()){
      const d=snap.data();
      const remote=d.payload||d.words||[];
      if(remote.length>0){
        const merged=[...remote];
        (window._db||[]).forEach(lw=>{if(!merged.find(r=>r.en===lw.en))merged.push(lw);});
        merged.forEach(w=>{if(!w.tag)w.tag='日常';});
        window._db=merged;
        db.length=0;merged.forEach(w=>db.push(w));
        localStorage.setItem(window._STORE,JSON.stringify(merged));
        if(window._updHdr)window._updHdr();
        if(window._updateTagSelects)window._updateTagSelects();
        showSyncMsg('☁ 雲端資料已同步（'+remote.length+' 個單字）');
      }
    }
  }catch(e){console.error('cloudLoad err',e);}
}
function showSyncMsg(msg){
  const el=document.getElementById('sync-msg');
  if(!el)return;
  el.textContent=msg;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',3000);
}
onAuthStateChanged(auth,user=>{
  uid=user?user.uid:null;
  const btn=document.getElementById('auth-btn');
  const info=document.getElementById('auth-info');
  if(!btn)return;
  if(user){btn.textContent='登出';info.textContent=user.displayName||user.email;cloudLoad();}
  else{btn.textContent='Google 登入';info.textContent='未登入・僅本地儲存';}
});
window._cloudSave=cloudSave;
window._login=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){alert('登入失敗：'+e.message);}};
window._logout=async()=>{if(confirm('確定登出？'))await signOut(auth);};
window._authClick=()=>uid?window._logout():window._login();
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Syne+Mono&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1612;--paper:#f5f0e8;--cream:#ede7d9;--warm:#d4c9b0;
  --sepia:#8b7355;--rust:#c4622d;--forest:#3d6b4f;--sky:#3a6b8a;--gold:#b8941f;
  --green-bg:#e8f2ec;--red-bg:#f8ede8;--blue-bg:#eef3f8;--purple:#6b4fa0;--purple-bg:#f0ebf8;
  --r:12px;--r-sm:8px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;display:flex;flex-direction:column;}
.topbar{background:var(--paper);padding:14px 18px 10px;border-bottom:1.5px solid var(--ink);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;line-height:1;color:var(--ink)}
.logo em{color:var(--rust);font-style:italic}
.due-badge{font-family:'Syne Mono',monospace;font-size:.7rem;background:var(--rust);color:#fff;padding:3px 10px;border-radius:99px;display:none;}
.due-badge.show{display:inline-block}
.bottom-nav{background:#fff;border-top:1px solid var(--warm);display:flex;flex-shrink:0;padding-bottom:var(--safe-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:.65rem;color:var(--sepia);gap:3px;transition:color .15s;}
.bnav-btn .icon{font-size:1.3rem;line-height:1}
.bnav-btn.on{color:var(--rust)}
.pages{flex:1;overflow:hidden;position:relative}
.pg{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px 16px 32px;}
.pg.on{display:block}
.card{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:0 1px 8px rgba(26,22,18,.07)}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--cream)}
.field{margin-bottom:12px}
.fl{display:block;font-size:.68rem;color:var(--sepia);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;font-weight:500}
.fl em{text-transform:none;letter-spacing:0;font-style:normal;color:var(--forest)}
input[type=text],textarea,select{width:100%;background:var(--paper);border:1.5px solid var(--warm);border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:1rem;color:var(--ink);padding:11px 13px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--sepia)}
textarea{resize:none;min-height:80px;font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.7}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border:none;border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:.95rem;cursor:pointer;font-weight:500;transition:all .15s;-webkit-appearance:none;width:100%;}
.btn+.btn{margin-top:8px}
.btn-ink{background:var(--ink);color:var(--paper)}.btn-ink:active{opacity:.85}
.btn-rust{background:var(--rust);color:#fff}.btn-rust:active{opacity:.85}
.btn-green{background:var(--forest);color:#fff}.btn-green:active{opacity:.85}
.btn-sky{background:var(--sky);color:#fff}.btn-sky:active{opacity:.85}
.btn-out{background:transparent;border:1.5px solid var(--warm);color:var(--sepia)}.btn-out:active{background:var(--cream)}
.btn-sm{padding:9px 16px;font-size:.85rem;width:auto}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1;margin:0}
.speak-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(58,107,138,.3);background:var(--blue-bg);color:var(--sky);cursor:pointer;font-size:15px;flex-shrink:0;transition:all .15s;}
.speak-btn:active{background:var(--sky);color:#fff}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.speak-btn.speaking{background:var(--sky);color:#fff;animation:pulse .5s ease infinite}
.tag-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tag-bar::-webkit-scrollbar{display:none}
.tag-pill{font-family:'Syne Mono',monospace;font-size:.7rem;padding:5px 14px;border-radius:99px;border:1.5px solid var(--warm);background:#fff;color:var(--sepia);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.tag-pill.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-wrap{perspective:1200px;margin-bottom:16px}
.fc-inner{position:relative;width:100%;min-height:260px;transform-style:preserve-3d;transition:transform .5s ease;cursor:pointer;}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);padding:20px 22px;display:flex;flex-direction:column;box-shadow:0 2px 16px rgba(26,22,18,.1);}
.fc-front{background:#fff;border:1px solid var(--warm);align-items:center;justify-content:center;text-align:center;}
.fc-front.danger{background:#fff8f6;border-color:rgba(196,98,45,.4)}
.fc-back{background:linear-gradient(135deg,#fff,#faf7f2);border:1px solid var(--warm);transform:rotateY(180deg);}
.fc-tag{font-family:'Syne Mono',monospace;font-size:.6rem;color:var(--sepia);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.fc-wrong-badge{font-family:'Syne Mono',monospace;font-size:.72rem;background:var(--red-bg);color:var(--rust);border:1.5px solid rgba(196,98,45,.3);padding:3px 12px;border-radius:99px;margin-bottom:8px;display:inline-block}
.fc-en{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--ink);margin-bottom:6px;line-height:1.3;word-break:break-word;max-width:100%}
.fc-phonetic{font-family:'Syne Mono',monospace;font-size:.9rem;color:var(--sky);margin-bottom:10px}
.fc-hint{font-size:.78rem;color:var(--sepia);margin-top:auto;padding-top:12px;font-style:italic}
.fc-back-zh{font-size:1.4rem;font-weight:500;color:var(--ink);margin-bottom:8px}
.fc-back-phonetic{font-family:'Syne Mono',monospace;font-size:.82rem;color:var(--sky);margin-bottom:12px}
.fc-back-sent{font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.7;color:var(--sepia);padding:10px 14px;background:var(--paper);border-radius:var(--r-sm);border-left:3px solid var(--rust);margin-bottom:10px}
.fc-back-sent strong{color:var(--rust);font-style:normal}
.fc-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fc-seen{font-family:'Syne Mono',monospace;font-size:.68rem;color:var(--sepia);background:var(--cream);padding:3px 10px;border-radius:99px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.flip-hint{animation:bounce 1.2s ease infinite;display:inline-block}
.fc-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.fc-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;height:44px;border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid transparent;white-space:nowrap}
.btn-again{background:var(--red-bg);color:var(--rust);border-color:rgba(196,98,45,.25)}
.btn-again:active{background:#f0d8d2}
.btn-fuzzy{background:#fef9ec;color:var(--gold);border-color:rgba(184,148,31,.25)}
.btn-fuzzy:active{background:#faefc8}
.btn-knew{background:var(--green-bg);color:var(--forest);border-color:rgba(61,107,79,.25)}
.btn-knew:active{background:#cde5d4}
.fc-prog{display:flex;align-items:center;gap:10px;font-family:'Syne Mono',monospace;font-size:.72rem;color:var(--sepia);margin-bottom:12px}
.pbar{flex:1;height:3px;background:var(--cream);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--sky),var(--forest));border-radius:99px;transition:width .4s}
.interval-legend{font-family:'Syne Mono',monospace;font-size:.65rem;color:var(--sepia);line-height:1.8;padding:8px 14px;background:var(--cream);border-radius:var(--r-sm)}
.write-pad-wrap{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 8px rgba(26,22,18,.07)}
.write-pad-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.write-pad-label{font-family:'Syne Mono',monospace;font-size:.65rem;color:var(--sepia);letter-spacing:.1em;text-transform:uppercase}
.write-pad-clear{font-family:'Noto Sans TC',sans-serif;font-size:.7rem;color:var(--sky);background:none;border:1px solid var(--warm);border-radius:99px;padding:3px 10px;cursor:pointer}
.write-pad-clear:active{background:var(--cream)}
.write-canvas{width:100%;height:100px;display:block;touch-action:none;border-radius:var(--r-sm);background:var(--paper);cursor:crosshair}
.quiz-card{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:22px 18px;box-shadow:0 1px 8px rgba(26,22,18,.07);position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--rust)}
.rtag{font-family:'Syne Mono',monospace;font-size:.6rem;color:var(--sepia);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;padding-left:4px}
.rc-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.rc-phonetic{font-family:'Syne Mono',monospace;font-size:.85rem;color:var(--sky)}
.sent-area{font-family:'Cormorant Garamond',serif;font-size:1.35rem;line-height:1.9;color:var(--ink);margin-bottom:6px;word-break:break-word}
.meaning{font-size:.8rem;color:var(--sepia);margin-bottom:18px;font-style:italic}
.blank-input{border:none;border-bottom:2.5px solid var(--rust);background:rgba(196,98,45,.06);border-radius:2px 2px 0 0;font-family:'Syne Mono',monospace;font-size:1.1rem;color:var(--rust);padding:2px 8px;outline:none;width:180px;text-align:center;letter-spacing:.08em;transition:all .2s;vertical-align:baseline;-webkit-appearance:none;}
.blank-input:focus{background:rgba(196,98,45,.1)}
.blank-input.ok{border-bottom-color:var(--forest);background:rgba(61,107,79,.08);color:var(--forest)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.blank-input.bad{animation:shake .3s ease}
.hint-box{font-family:'Syne Mono',monospace;font-size:1.1rem;letter-spacing:.25em;color:var(--sky);margin:10px 0;padding:10px 14px;background:var(--blue-bg);border-radius:var(--r-sm);border:1px dashed rgba(58,107,138,.3)}
.fb{padding:11px 14px;border-radius:var(--r-sm);font-size:.88rem;display:flex;align-items:center;gap:7px;margin:10px 0}
.fb-ok{background:var(--green-bg);color:var(--forest);border:1px solid rgba(61,107,79,.2)}
.fb-bad{background:var(--red-bg);color:var(--rust);border:1px solid rgba(196,98,45,.2)}
.acts{display:flex;flex-direction:column;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--cream)}
.acts-row{display:flex;gap:8px}.acts-row .btn{flex:1;margin:0}
.word-item{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(26,22,18,.06);}
.wi-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.wi-en{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;flex:1}
.wi-phonetic{font-family:'Syne Mono',monospace;font-size:.78rem;color:var(--sky);margin-bottom:3px}
.wi-zh{font-size:.82rem;color:var(--sepia);margin-bottom:6px}
.wi-sent{font-size:.78rem;color:var(--sepia);font-style:italic;line-height:1.5}
.wi-bottom{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--cream);flex-wrap:wrap}
.badge{font-family:'Syne Mono',monospace;font-size:.62rem;padding:2px 9px;border-radius:99px;display:inline-block}
.b-new{background:#fef3e2;color:#8b5e0a;border:1px solid #e8c87a}
.b-learning{background:var(--blue-bg);color:var(--sky);border:1px solid rgba(58,107,138,.25)}
.b-known{background:var(--green-bg);color:var(--forest);border:1px solid rgba(61,107,79,.25)}
.b-graduated{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(107,79,160,.25)}
.tag-badge{font-family:'Syne Mono',monospace;font-size:.62rem;padding:2px 9px;border-radius:99px;background:var(--blue-bg);color:var(--sky);border:1px solid rgba(58,107,138,.2)}
.seen-badge{font-family:'Syne Mono',monospace;font-size:.62rem;padding:2px 9px;border-radius:99px;background:var(--cream);color:var(--sepia);border:1px solid var(--warm)}
.del-btn{margin-left:auto;font-size:.75rem;color:var(--rust);background:none;border:none;cursor:pointer;padding:4px 8px;font-family:'Noto Sans TC',sans-serif}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:#fff;border:1px solid var(--warm);border-radius:var(--r-sm);padding:12px 14px;text-align:center;box-shadow:0 1px 6px rgba(26,22,18,.06)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1}
.stat-lbl{font-size:.65rem;color:var(--sepia);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.empty-state{text-align:center;padding:48px 20px;color:var(--sepia)}
.empty-state .big{font-family:'Cormorant Garamond',serif;font-size:3.5rem;opacity:.2;display:block;margin-bottom:12px}
.empty-state p{font-size:.9rem;line-height:1.7}
.next-t{font-family:'Syne Mono',monospace;font-size:.7rem;color:var(--sepia);background:var(--cream);padding:3px 10px;border-radius:99px;display:inline-block;margin-top:8px}
.done-card{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:36px 20px;text-align:center;box-shadow:0 1px 8px rgba(26,22,18,.07)}
.done-card .big{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--forest);display:block;margin-bottom:8px}
.backup-card{background:var(--blue-bg);border:1px solid rgba(58,107,138,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.backup-title{font-size:.9rem;font-weight:500;color:var(--sky);margin-bottom:10px}
.backup-desc{font-size:.8rem;color:var(--sepia);line-height:1.7;margin-bottom:12px}
.alert{padding:11px 14px;border-radius:var(--r-sm);font-size:.85rem;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-ok{background:var(--green-bg);color:var(--forest);border:1px solid rgba(61,107,79,.2)}
.alert-err{background:var(--red-bg);color:var(--rust);border:1px solid rgba(196,98,45,.2)}
.voice-card{background:#fff;border:1px solid var(--warm);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.voice-title{font-size:.9rem;font-weight:500;color:var(--ink);margin-bottom:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Lexi<em>ca</em></div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
    <span class="due-badge" id="due-badge">0 待複習</span>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="auth-info" style="font-size:.62rem;color:var(--sepia);font-family:'Syne Mono',monospace;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">未登入</span>
      <button id="auth-btn" onclick="window._authClick()" style="font-family:'Noto Sans TC',sans-serif;font-size:.65rem;padding:3px 10px;border-radius:99px;border:1.5px solid var(--warm);background:#fff;color:var(--ink);cursor:pointer">Google 登入</button>
    </div>
    <span id="sync-msg" style="font-size:.6rem;color:var(--forest);font-family:'Syne Mono',monospace;opacity:0;transition:opacity .5s"></span>
  </div>
</div>
<div class="pages">
  <!-- ADD -->
  <div class="pg on" id="pg-add">
    <div class="card">
      <div class="card-title">✦ 新增單字</div>
      <div style="display:flex;background:var(--cream);border-radius:var(--r-sm);padding:3px;margin-bottom:16px;gap:3px">
        <button id="tab-claude" onclick="switchAddTab('claude')" style="flex:1;padding:9px;border:none;border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.82rem;cursor:pointer;font-weight:500;background:var(--ink);color:var(--paper);transition:all .2s">🤖 Claude 查詢</button>
        <button id="tab-manual" onclick="switchAddTab('manual')" style="flex:1;padding:9px;border:none;border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.82rem;cursor:pointer;font-weight:500;background:transparent;color:var(--sepia);transition:all .2s">✏️ 手動輸入</button>
      </div>
      <div id="panel-claude">
        <div style="background:var(--blue-bg);border-radius:var(--r-sm);padding:14px;margin-bottom:14px;font-size:.83rem;color:var(--sky);line-height:1.8;border:1px solid rgba(58,107,138,.2)">
          <strong>使用方式：</strong><br>1. 在 Claude.ai 說：「幫我查 單字1, 單字2」<br>2. 複製 Claude 給的 JSON<br>3. 選擇分類，按「匯入」
        </div>
        <div class="field">
          <label class="fl">貼上 Claude 給的 JSON</label>
          <textarea id="paste-area" rows="4" placeholder='[{"en":"stir","phonetic":"/stɜːr/","zh":"攪拌","sentence":"She __ the soup slowly.","sentenceZh":"她慢慢地攪拌湯。"}]' style="font-family:monospace;font-size:.82rem"></textarea>
        </div>
        <div class="field">
          <label class="fl">分類 TAG <em>— 不填為「日常」</em></label>
          <div style="display:flex;gap:8px">
            <select id="import-tag-select" style="flex:1" onchange="onImportTagSelectChange()">
              <option value="日常">日常</option>
            </select>
            <input type="text" id="import-tag-new" placeholder="新分類名稱" style="flex:1;display:none" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>

        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--sepia);margin-bottom:12px;cursor:pointer">

      <div id="panel-manual" style="display:none">
        <div class="field"><label class="fl">英文單字 *</label><input type="text" id="f-word" placeholder="e.g. persevere" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/></div>
        <div class="field"><label class="fl">音標</label><input type="text" id="f-phonetic" placeholder="e.g. /pɜːrsɪˈvɪər/"/></div>
        <div class="field"><label class="fl">中文意思</label><input type="text" id="f-zh" placeholder="e.g. 堅持、毅然"/></div>
        <div class="field"><label class="fl">例句 <em>— 用 __ 標示填空</em></label><textarea id="f-sent" rows="3" placeholder="She __ through every hardship."></textarea></div>
        <div class="field"><label class="fl">例句中文翻譯 <em>— 選填</em></label><input type="text" id="f-sent-zh" placeholder="e.g. 她毅然撐過每一個難關。"/></div>
        <div class="field">
          <label class="fl">分類 TAG <em>— 不填為「日常」</em></label>
          <div style="display:flex;gap:8px">
            <select id="manual-tag-select" style="flex:1" onchange="onManualTagSelectChange()">
              <option value="日常">日常</option>
            </select>
            <input type="text" id="manual-tag-new" placeholder="新分類名稱" style="flex:1;display:none" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
          </div>
        </div>
        <button class="btn btn-green" onclick="addWord()">✦ 加入單字庫</button>
        <div class="alert" id="add-alert" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="backup-card">
      <div class="backup-title">💾 備份 / 換裝置</div>
      <div class="backup-desc">匯出備份檔後可在其他瀏覽器或裝置匯入。</div>
      <div class="btn-row">
        <button class="btn btn-sky btn-sm" onclick="exportBackup()">📤 匯出</button>
        <label class="btn btn-out btn-sm" style="cursor:pointer">📥 匯入<input type="file" accept=".json" onchange="importBackup(this)" style="display:none"/></label>
      </div>
      <div class="alert" id="backup-alert" style="margin-top:10px"></div>
    </div>
    <div class="voice-card">
      <div class="voice-title">🔊 發音設定</div>
      <div class="field">
        <label class="fl">選擇語音</label>
        <select id="voice-select" onchange="saveVoice()" style="background:var(--paper);border:1.5px solid var(--warm);border-radius:var(--r-sm);font-size:.95rem;color:var(--ink);padding:10px 12px;-webkit-appearance:none"><option value="">載入中…</option></select>
      </div>
      <div class="btn-row">
        <button class="btn btn-out btn-sm" style="flex:1" onclick="testVoice()">▶ 試聽</button>
        <div style="font-size:.75rem;color:var(--sepia);flex:2;padding-left:8px;line-height:1.5">推薦選 <strong>Samantha</strong> 或 <strong>Karen</strong></div>
      </div>
    </div>
    <div style="text-align:center;color:var(--sepia);font-size:.78rem;padding:4px 0">
      單字庫 <strong id="tot">0</strong> 個・今日待複習 <strong id="due-n" style="color:var(--rust)">0</strong> 個
    </div>
    <div style="text-align:center;color:var(--warm);font-family:'Syne Mono',monospace;font-size:.62rem;padding:8px 0 0">Lexica v15 · 2026-07</div>
  </div>
  <!-- FLASH -->
  <div class="pg" id="pg-flash">
    <div class="tag-bar" id="flash-tag-bar"></div>
    <div id="fl-wrap"></div>
  </div>
  <!-- QUIZ -->
  <div class="pg" id="pg-quiz">
    <div class="tag-bar" id="quiz-tag-bar"></div>
    <div class="stats-grid" id="q-stats"></div>
    <div id="q-wrap"></div>
  </div>
  <!-- LIST -->
  <div class="pg" id="pg-list">
    <div class="tag-bar" id="list-tag-bar"></div>
    <div class="stats-grid" id="l-stats" style="margin-bottom:16px"></div>
    <div id="list-body"></div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bnav-btn on" onclick="goTab('add',this)"><span class="icon">＋</span>新增</button>
  <button class="bnav-btn" onclick="goTab('flash',this)"><span class="icon">🃏</span>閃卡</button>
  <button class="bnav-btn" onclick="goTab('quiz',this)"><span class="icon">✏️</span>測驗</button>
  <button class="bnav-btn" onclick="goTab('list',this)"><span class="icon">≡</span>單字</button>
</nav>
<script>
const STORE='lexica_data';
const DAY=24*60*60*1000,WEEK=7*DAY,BATCH=10;
const KNEW_INTERVALS=[7*DAY,14*DAY,28*DAY];
const DEFAULT_TAG='日常';

/* ══ ESCAPE HELPERS (P0-2 fix) ══ */
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ DATA ══ */
let db=[];
(function(){
  const oldKeys=['lexica_v9','lexica_v8','lexica_v7','lexica_v6','lexica_v5','lexica_v4','lexica_v3'];
  try{
    const s=localStorage.getItem(STORE);
    if(s){db=JSON.parse(s)||[];db.forEach(w=>{if(!w.tag)w.tag=DEFAULT_TAG;});return;}
    for(const k of oldKeys){const o=localStorage.getItem(k);if(o){const p=JSON.parse(o);if(Array.isArray(p)&&p.length){db=p;db.forEach(w=>{if(!w.tag)w.tag=DEFAULT_TAG;});localStorage.setItem(STORE,JSON.stringify(db));localStorage.removeItem(k);return;}}}
  }catch(e){}
})();
window._STORE=STORE;
window._db=db;

const sv=()=>{localStorage.setItem(STORE,JSON.stringify(db));window._db=db;if(window._cloudSave)window._cloudSave();};
const now=()=>Date.now();
const fmt=ts=>new Date(ts).toLocaleDateString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const TODAY=()=>new Date().toISOString().slice(0,10);
const isDue=w=>w.status!=='graduated'&&w.nextReview<=now();
const dueWords=()=>db.filter(isDue);

function allTags(){
  const tags=new Set(db.map(w=>w.tag||DEFAULT_TAG));
  return[DEFAULT_TAG,...[...tags].filter(t=>t!==DEFAULT_TAG).sort()];
}

let flashTag='全部',quizTag='全部',listTag='全部';
function filteredDb(tag){
  if(tag==='全部')return db;
  return db.filter(w=>(w.tag||DEFAULT_TAG)===tag);
}

function updHdr(){
  const n=dueWords().length;
  document.getElementById('tot').textContent=db.length;
  document.getElementById('due-n').textContent=n;
  const b=document.getElementById('due-badge');
  b.textContent=n+' 待複習';b.classList.toggle('show',n>0);
}
window._updHdr=updHdr;

/* ══ TAG BAR (P0-1 fix: data attributes, no serialized callbacks) ══ */
const tagBarHandlers={};
function renderTagBar(barId,current,onSelect){
  const bar=document.getElementById(barId);
  if(!bar)return;
  tagBarHandlers[barId]=onSelect;
  const uniq=['全部',...[...new Set(db.map(w=>w.tag||DEFAULT_TAG))].sort()];
  bar.innerHTML=uniq.map(t=>`<button class="tag-pill${t===current?' on':''}" data-bar="${escH(barId)}" data-tag="${escH(t)}" onclick="onTagPill(this)">${escH(t)}</button>`).join('');
}
function onTagPill(el){
  const fn=tagBarHandlers[el.dataset.bar];
  if(fn)fn(el.dataset.tag);
}
function flashTagSelect(t){flashTag=t;renderTagBar('flash-tag-bar',flashTag,flashTagSelect);initFlash(false,true);}
function quizTagSelect(t){quizTag=t;renderTagBar('quiz-tag-bar',quizTag,quizTagSelect);initQuiz();}
function listTagSelect(t){listTag=t;renderTagBar('list-tag-bar',listTag,listTagSelect);renderList();}

function goTab(t,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+t).classList.add('on');btn.classList.add('on');
  if(t==='flash'){renderTagBar('flash-tag-bar',flashTag,flashTagSelect);initFlash();}
  if(t==='quiz'){renderTagBar('quiz-tag-bar',quizTag,quizTagSelect);initQuiz();}
  if(t==='list'){renderTagBar('list-tag-bar',listTag,listTagSelect);renderList();}
  updHdr();
}

/* ══ SPEECH ══ */
let voices=[],savedVoiceName=localStorage.getItem('lexica_voice')||'';
function loadVoices(){
  voices=window.speechSynthesis.getVoices();if(!voices.length)return;
  const sel=document.getElementById('voice-select');if(!sel)return;
  const en=voices.filter(v=>v.lang.startsWith('en'));
  sel.innerHTML=en.map(v=>`<option value="${escH(v.name)}" ${v.name===savedVoiceName?'selected':''}>${escH(v.name)} (${v.lang})</option>`).join('');
  if(!savedVoiceName&&en.length){
    const pref=['Samantha','Karen','Daniel','Alex','Moira'];
    const best=pref.map(n=>en.find(v=>v.name===n)).find(Boolean)||en[0];
    if(best){sel.value=best.name;savedVoiceName=best.name;localStorage.setItem('lexica_voice',best.name);}
  }
}
window.speechSynthesis.onvoiceschanged=loadVoices;setTimeout(loadVoices,300);
function saveVoice(){savedVoiceName=document.getElementById('voice-select').value;localStorage.setItem('lexica_voice',savedVoiceName);}
function testVoice(){speak('Hello, this is a test.',null);}
function getVoice(){return(savedVoiceName&&voices.find(v=>v.name===savedVoiceName))||voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang.startsWith('en'))||null;}
function speak(text,btn){
  if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;
  const v=getVoice();if(v)u.voice=v;
  if(btn){btn.classList.add('speaking');u.onend=u.onerror=()=>btn.classList.remove('speaking');}
  window.speechSynthesis.speak(u);
}

function switchAddTab(tab){
  const isClaude=tab==='claude';
  document.getElementById('panel-claude').style.display=isClaude?'block':'none';
  document.getElementById('panel-manual').style.display=isClaude?'none':'block';
  const c=document.getElementById('tab-claude'),m=document.getElementById('tab-manual');
  c.style.background=isClaude?'var(--ink)':'transparent';c.style.color=isClaude?'var(--paper)':'var(--sepia)';
  m.style.background=isClaude?'transparent':'var(--ink)';m.style.color=isClaude?'var(--sepia)':'var(--paper)';
}

/* ══ TAG SELECT helpers ══ */
function updateTagSelects(){
  const tags=allTags();
  ['import-tag-select','manual-tag-select'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=tags.map(t=>`<option value="${escH(t)}">${escH(t)}</option>`).join('')+'<option value="__new__">＋ 新增分類…</option>';
    if(tags.includes(cur))sel.value=cur;
  });
}
window._updateTagSelects=updateTagSelects;
function onImportTagSelectChange(){
  const sel=document.getElementById('import-tag-select');
  const inp=document.getElementById('import-tag-new');
  if(sel.value==='__new__'){inp.style.display='block';inp.focus();}
  else inp.style.display='none';
}
function onManualTagSelectChange(){
  const sel=document.getElementById('manual-tag-select');
  const inp=document.getElementById('manual-tag-new');
  if(sel.value==='__new__'){inp.style.display='block';inp.focus();}
  else inp.style.display='none';
}
function getImportTag(){
  const sel=document.getElementById('import-tag-select');
  if(sel.value==='__new__'){const v=document.getElementById('import-tag-new').value.trim();return v||DEFAULT_TAG;}
  return sel.value||DEFAULT_TAG;
}
function getManualTag(){
  const sel=document.getElementById('manual-tag-select');
  if(sel.value==='__new__'){const v=document.getElementById('manual-tag-new').value.trim();return v||DEFAULT_TAG;}
  return sel.value||DEFAULT_TAG;
}

/* ══ PASTE IMPORT ══ */
function pasteImport(){
  const raw=document.getElementById('paste-area').value.trim();
  if(!raw){showAlert('paste-alert','err','請先貼上 JSON');return;}
  const tag=getImportTag();
  const overwriteTag=document.getElementById('import-overwrite-tag')?document.getElementById('import-overwrite-tag').checked:false;
  let words;
  try{
    const clean=raw
      .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036\u00AB\u00BB]/g,'"')
      .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g,"'")
      .replace(/```json|```/g,'').trim();
    words=JSON.parse(clean);if(!Array.isArray(words))words=[words];
  }catch(e){showAlert('paste-alert','err','格式錯誤：'+e.message);return;}
  let added=0,updated=0,skipped=0;
  words.forEach(w=>{
    if(!w.en)return;
    if(w.sentence){
      w.sentence=w.sentence.replace(/_{3,}/g,'__').replace(/—/g,'__').replace(/–/g,'__');
      if(!w.sentence.includes('__')&&w.en){const re=new RegExp('\\b'+w.en.replace(/[-\s]+/g,'[-\\s]+')+'\\b','gi');if(re.test(w.sentence))w.sentence=w.sentence.replace(re,'__');}
    }
    const ex=db.find(x=>x.en===w.en.toLowerCase());
    if(ex){
      let ch=false;
      if(overwriteTag&&ex.tag!==tag){ex.tag=tag;ch=true;}
      if(w.sentenceZh&&!ex.sentenceZh){ex.sentenceZh=w.sentenceZh;ch=true;}
      if(w.phonetic&&!ex.phonetic){ex.phonetic=w.phonetic;ch=true;}
      if(w.zh&&!ex.zh){ex.zh=w.zh;ch=true;}
      if(w.sentence&&!ex.sentence){ex.sentence=w.sentence;ch=true;}
      if(ch)updated++;else skipped++;return;
    }
    if(!w.sentence)return;
    db.push(newWord({...w,tag}));added++;
  });
  sv();updHdr();updateTagSelects();
  const msg=[];if(added>0)msg.push('新增 '+added+' 個');if(updated>0)msg.push('更新 '+updated+' 個');if(skipped>0)msg.push(skipped+' 個無變動');
  if(msg.length){showAlert('paste-alert','ok','✓ '+msg.join('・')+'（'+tag+'）');document.getElementById('paste-area').value='';}
  else showAlert('paste-alert','err','沒有可匯入的單字');
}

function newWord(w){
  return{id:Date.now()+Math.random(),en:w.en.toLowerCase(),phonetic:w.phonetic||'',zh:w.zh||'',
    sentence:w.sentence,sentenceZh:w.sentenceZh||'',
    tag:w.tag||DEFAULT_TAG,
    status:'new',nextReview:now(),
    wrongCount:0,hintCount:0,seenCount:0,lastSeen:null,
    knewCount:0,fuzzyCount:0,flashWrongCount:0};
}

function addWord(){
  const en=document.getElementById('f-word').value.trim().toLowerCase();
  const zh=document.getElementById('f-zh').value.trim();
  const phonetic=document.getElementById('f-phonetic').value.trim();
  const sentence=document.getElementById('f-sent').value.trim();
  const sentenceZh=document.getElementById('f-sent-zh')?document.getElementById('f-sent-zh').value.trim():'';
  const tag=getManualTag();
  if(!en){showAlert('add-alert','err','請輸入英文單字');return;}
  if(!sentence.includes('__')){showAlert('add-alert','err','例句需要 __ 作為填空位置');return;}
  if(db.find(w=>w.en===en)&&!confirm('「'+en+'」已存在，確定再加入？'))return;
  db.push(newWord({en,zh,phonetic,sentence,sentenceZh,tag}));sv();
  ['f-word','f-zh','f-phonetic','f-sent','f-sent-zh'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-word').focus();
  showAlert('add-alert','ok','✓「'+en+'」已加入（'+tag+'）！');
  updHdr();updateTagSelects();
}

function exportBackup(){
  if(!db.length){alert('單字庫是空的');return;}
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='Lexica備份_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
}
function importBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);if(!Array.isArray(data))throw new Error();
      let added=0;
      data.forEach(w=>{
        if(!w.en)return;if(db.find(x=>x.en===w.en))return;
        db.push({seenCount:0,lastSeen:null,knewCount:0,fuzzyCount:0,flashWrongCount:0,tag:DEFAULT_TAG,...w,id:w.id||Date.now()+Math.random()});
        added++;
      });
      sv();updHdr();updateTagSelects();showAlert('backup-alert','ok','✓ 匯入 '+added+' 個單字');
    }catch(e2){showAlert('backup-alert','err','檔案格式錯誤');}
    input.value='';
  };reader.readAsText(file);
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);
  el.className='alert show alert-'+(type==='ok'?'ok':'err');
  el.textContent=msg;setTimeout(()=>el.classList.remove('show'),3000);
}

/* ══ FLASHCARD ══ */
let FQ=[],fi=0,fFlipped=false,fBatchSeen=new Set();

function saveFlashProgress(){
  localStorage.setItem('lexica_flash_progress',JSON.stringify({
    date:TODAY(),fi,tag:flashTag,fqIds:FQ.map(w=>w.id),seenIds:[...fBatchSeen]
  }));
}
function loadFlashProgress(){
  try{
    const s=localStorage.getItem('lexica_flash_progress');
    if(!s)return false;
    const p=JSON.parse(s);
    if(p.date!==TODAY())return false;
    if(p.tag!==flashTag)return false;
    const rebuilt=p.fqIds.map(id=>db.find(w=>w.id===id)).filter(Boolean);
    if(!rebuilt.length)return false;
    FQ=rebuilt;fi=Math.min(p.fi,FQ.length);fBatchSeen=new Set(p.seenIds||[]);
    return true;
  }catch(e){return false;}
}

function buildFlashBatch(forceExtra=false){
  const pool=filteredDb(flashTag).filter(w=>w.status!=='graduated');
  const t=now();
  const forced=pool.filter(w=>(w.flashWrongCount||0)>=3).sort((a,b)=>(b.flashWrongCount||0)-(a.flashWrongCount||0)).slice(0,3);
  const forcedIds=new Set(forced.map(w=>w.id));
  const due=pool.filter(w=>w.nextReview<=t&&!forcedIds.has(w.id)).sort(()=>Math.random()-.5);
  const wrong12=due.filter(w=>(w.flashWrongCount||0)>=1&&(w.flashWrongCount||0)<=2).slice(0,3);
  const wrong12Ids=new Set(wrong12.map(w=>w.id));
  const restDue=due.filter(w=>!wrong12Ids.has(w.id));
  let batch=[...forced,...wrong12,...restDue.slice(0,BATCH-forced.length-wrong12.length)];
  if(batch.length<BATCH&&forceExtra){
    const bIds=new Set(batch.map(w=>w.id));
    const extras=pool.filter(w=>!bIds.has(w.id)).sort(()=>Math.random()-.5).slice(0,BATCH-batch.length);
    batch=[...batch,...extras];
  }
  return batch.sort(()=>Math.random()-.5);
}

function initFlash(forceExtra=false,forceNew=false){
  renderTagBar('flash-tag-bar',flashTag,flashTagSelect);
  if(!forceExtra&&!forceNew&&loadFlashProgress()){
    fFlipped=false;renderFlashCard();
    setTimeout(initWritePad,50);return;
  }
  FQ=buildFlashBatch(forceExtra);
  fi=0;fFlipped=false;fBatchSeen=new Set();
  saveFlashProgress();
  renderFlashCard();
  setTimeout(initWritePad,50);
}

function renderFlashCard(){
  const wrap=document.getElementById('fl-wrap');
  const pool=filteredDb(flashTag);
  if(!pool.length){
    wrap.innerHTML=`<div class="empty-state"><span class="big">🃏</span><p>「${escH(flashTag)}」沒有單字</p><p style="margin-top:8px;font-size:.82rem">請先在「新增」加入單字</p></div>`;return;
  }
  if(fi>=FQ.length){
    const shownIds=new Set(FQ.map(w=>w.id));
    const moreLeft=pool.filter(w=>isDue(w)&&!shownIds.has(w.id)).length;
    const nx=pool.filter(w=>w.status!=='graduated'&&w.nextReview>now()).sort((a,b)=>a.nextReview-b.nextReview)[0];
    if(moreLeft>0){
      wrap.innerHTML=`<div class="done-card">
        <span class="big">本輪完成 ✓</span>
        <p style="color:var(--sepia);font-size:.88rem;margin-bottom:16px">還有 <strong style="color:var(--rust)">${moreLeft}</strong> 個今日到期單字</p>
        <button class="btn btn-ink" onclick="initFlash(false,true)">繼續下一組（${Math.min(BATCH,moreLeft)}張）</button>
        <button class="btn btn-out" style="margin-top:8px" onclick="goTab('quiz',document.querySelectorAll('.bnav-btn')[2])">切換到測驗模式 ✏️</button>
      </div>`;
    }else{
      wrap.innerHTML=`<div class="done-card">
        <span class="big">今日完成 🎉</span>
        <p style="color:var(--sepia);font-size:.88rem;margin-bottom:4px">今日所有到期單字已複習完畢！</p>
        ${nx?`<p style="font-family:'Syne Mono',monospace;font-size:.72rem;color:var(--sepia);margin-bottom:12px">明天見 · 下次複習：${fmt(nx.nextReview)}</p>`:''}

function fcAnswer(score){
  const wId=FQ[fi].id;const rec=db.find(x=>x.id===wId);
  if(rec){

    else if(score===1){const fz=rec.fuzzyCount||0;rec.nextReview=now()+(fz===0?DAY:3*DAY);rec.fuzzyCount=fz+1;rec.status='learning';rec.flashWrongCount=0;rec.knewCount=0;}
    else{const kc=rec.knewCount||0;if(kc>=3){rec.status='graduated';rec.nextReview=now()+365*DAY;}else{rec.nextReview=now()+KNEW_INTERVALS[kc];rec.status='known';}rec.knewCount=(rec.knewCount||0)+1;rec.flashWrongCount=0;rec.fuzzyCount=0;}
    sv();
  }
  fi++;saveFlashProgress();renderFlashCard();updHdr();

/* ══ HANDWRITING PAD ══ */
let writeCtx=null,writing=false,lastX=0,lastY=0,writePadRetry=0;
function initWritePad(){
  const canvas=document.getElementById('write-canvas');
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  if(rect.width===0){
    if(writePadRetry<10){writePadRetry++;setTimeout(initWritePad,50);}
    return;
  }
  writePadRetry=0;
  const dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  writeCtx=canvas.getContext('2d');
  writeCtx.scale(dpr,dpr);
  writeCtx.lineWidth=2.5;writeCtx.lineCap='round';writeCtx.lineJoin='round';writeCtx.strokeStyle='#3a6b8a';
  drawGuideLine(rect);
  canvas.onpointerdown=startWrite;canvas.onpointermove=moveWrite;
  canvas.onpointerup=endWrite;canvas.onpointerleave=endWrite;
}
function drawGuideLine(rect){
  if(!writeCtx)return;
  writeCtx.save();writeCtx.strokeStyle='#d4c9b0';writeCtx.lineWidth=1;writeCtx.setLineDash([4,4]);
  const y=rect.height*0.68;
  writeCtx.beginPath();writeCtx.moveTo(10,y);writeCtx.lineTo(rect.width-10,y);writeCtx.stroke();
  writeCtx.restore();
  writeCtx.strokeStyle='#3a6b8a';writeCtx.lineWidth=2.5;writeCtx.setLineDash([]);
}
function getPos(e,canvas){const rect=canvas.getBoundingClientRect();return{x:e.clientX-rect.left,y:e.clientY-rect.top};}
function startWrite(e){writing=true;const pos=getPos(e,e.target);lastX=pos.x;lastY=pos.y;}
function moveWrite(e){
  if(!writing||!writeCtx)return;e.preventDefault();
  const pos=getPos(e,e.target);
  writeCtx.beginPath();writeCtx.moveTo(lastX,lastY);writeCtx.lineTo(pos.x,pos.y);writeCtx.stroke();
  lastX=pos.x;lastY=pos.y;
}
function endWrite(){writing=false;}
function clearWritePad(){
  const canvas=document.getElementById('write-canvas');
  if(!canvas||!writeCtx)return;
  const rect=canvas.getBoundingClientRect();
  writeCtx.clearRect(0,0,canvas.width,canvas.height);drawGuideLine(rect);
}

function checkAns(){
  if(ansState!=='input')return;
  const inp=document.getElementById('blank');const raw=inp.value;
  const norm=s=>s.toLowerCase().replace(/\s/g,'').replace(/[^\x20-\x7E]/g,'').trim();

  if(!newTag||!newTag.trim())return;
  const t=newTag.trim();
  filtered.forEach(w=>{const rec=db.find(x=>x.id===w.id);if(rec)rec.tag=t;});
  sv();updateTagSelects();renderList();
  showAlert('backup-alert','ok',`✓ 已將 ${filtered.length} 個單字改為「${t}」`);
}
function del(id){
  const numId=parseFloat(id);
  if(!confirm('確定要刪除？'))return;
  db=db.filter(w=>w.id!==numId);
  window._db=db;
  sv();renderList();updHdr();
}

updHdr();updateTagSelects();
</script>
</body>
